name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build server
        run: go build ./cmd/server/

      - name: Build agent
        run: go build ./cmd/agent/

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
